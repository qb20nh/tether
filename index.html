<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#111827" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="TETHER" />
  <meta name="darkreader-lock">
  <title>TETHER</title>
  <link rel="preload" href="/fonts/material-symbols-rounded-w300-grad200-opsz20.woff2" as="font" type="font/woff2"
    crossorigin />
  <script id="theme-bootstrap">
    (() => {
      const THEME_KEY = 'tetherTheme';
      const DEFAULT_THEME = 'dark';
      const detectSystemTheme = () => {
        try {
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
          if (window.matchMedia('(prefers-color-scheme: light)').matches) return 'light';
        } catch {
          // Ignore unsupported environments.
        }
        return DEFAULT_THEME;
      };

      let activeTheme = DEFAULT_THEME;
      try {
        const storedTheme = window.localStorage.getItem(THEME_KEY);
        activeTheme = storedTheme === 'light' || storedTheme === 'dark'
          ? storedTheme
          : detectSystemTheme();
      } catch {
        activeTheme = detectSystemTheme();
      }

      const root = document.documentElement;
      root.dataset.theme = activeTheme;
      root.classList.toggle('theme-light', activeTheme === 'light');
    })();
  </script>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="icon" type="image/svg+xml" href="/src/logo.svg" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>

<body>
  <div id="app" aria-busy="true"><!--app-boot-shell--></div>
  <script type="module" src="/src/app.ts"></script>
</body>

</html>
