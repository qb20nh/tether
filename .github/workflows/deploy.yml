name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_run:
    workflows: ["daily-level"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci || npm install

      - name: Resolve app build identity (ignore daily-content-only commits)
        run: |
          set -euo pipefail
          non_daily_count="$(git rev-list --count HEAD -- . ':(exclude)public/daily/today.json' ':(exclude)public/daily/history.json')"
          if ! [[ "${non_daily_count}" =~ ^[0-9]+$ ]]; then
            echo "Invalid non-daily commit count: ${non_daily_count}"
            exit 1
          fi
          build_number="$((non_daily_count + 1))"
          build_label="$(git log -1 --format=%h -- . ':(exclude)public/daily/today.json' ':(exclude)public/daily/history.json')"
          if [ -z "${build_label}" ]; then
            build_label="main"
          fi
          echo "VITE_BUILD_NUMBER=${build_number}" >> "$GITHUB_ENV"
          echo "VITE_BUILD_LABEL=${build_label}" >> "$GITHUB_ENV"
          echo "Using build number ${build_number} (${build_label})"
        
      - name: Build
        run: npm run build

      - name: Verify PWA build artifact
        run: node scripts/verify_pages_pwa_build.js

      - name: Verify release build excludes debug artifacts
        run: npm run verify:release-no-debug
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
