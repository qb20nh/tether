name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_run:
    workflows: ["daily-level"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check duplication threshold
        run: pnpm run verify:duplication

      - name: Resolve app build identity (ignore daily-content-only commits)
        run: node scripts/resolve_build_identity.js >> "$GITHUB_ENV"
        
      - name: Build
        run: pnpm run build

      - name: Verify PWA build artifact
        run: node scripts/verify_pages_pwa_build.js

      - name: Verify release build excludes debug artifacts
        run: pnpm run verify:release-no-debug
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
